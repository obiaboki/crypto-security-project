<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Crypto Security Simulation Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="container">
    <nav class="sidebar">
      <h1 class="logo">SimEx</h1>
      <ul>
        <li class="active"><span>🏠</span> Dashboard</li>
        <li><span>💹</span> Trade</li>
        <li><span>👛</span> Wallet</li>
        <li><span>🔒</span> Security</li>
      </ul>
    </nav>

    <main class="main-content">
      <header>
        <h2>Dashboard</h2>
        <div id="live-btc-price">BTC: <span id="btc-price">$00,000</span></div>
      </header>

      <section class="cards">
        <div class="card balance">
          <div class="card-title">BTC Balance</div>
          <div class="card-value">0.527818 <span class="compare">BTC</span></div>
        </div>
        <div class="card balance">
          <div class="card-title">USDT Balance</div>
          <div class="card-value">1205.17 <span class="compare">USDT</span></div>
        </div>
        <div class="card action-card">
          <button id="withdraw-btn" onclick="location.href='withdraw.html'">Withdraw</button>
        </div>
      </section>

      <section class="chart-section">
        <h3>BTC/USDT Price Trend</h3>
        <canvas id="btcChart"></canvas>
      </section>

      <footer>
        <small>
          ⚠ This is a simulation dashboard for educational purposes. No real funds or private keys should be used.
        </small>
      </footer>
    </main>
  </div>

  <script src="price.js"></script>
  <script src="chart.js"></script>
</body>
</html>
